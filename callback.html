<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>連携処理中... | ASOBINEXT</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 480px; margin: 0 auto; padding: 80px 24px; text-align: center; color: #222; }
  .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #fe2c55; border-radius: 50%; width: 48px; height: 48px; animation: spin 1s linear infinite; margin: 20px auto; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  h2 { font-size: 20px; }
  .note { color: #666; font-size: 14px; margin-top: 16px; }
</style>
</head>
<body>
  <h2>🔄 連携処理中...</h2>
  <div class="spinner"></div>
  <p class="note">TikTokアカウントとの連携を完了させています。<br>自動的に次のページに移動します。</p>

<script>
  // ============================================================
  // ⚠️ ここだけ書き換え ⚠️
  // Apps ScriptのウェブアプリURL(/execで終わるもの)を貼り付け
  // ============================================================
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzDvbFY8XMV1sQCh2JdjfkNHn9BEyUJuCCXTrTp7hQrR2nT6Ace0bX3GE-L8MsJu0mG/exec";
  // ============================================================

  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  const error = params.get('error');

  if (error) {
    document.body.innerHTML = `
      <div style="font-family:sans-serif;text-align:center;padding:40px;">
        <h2>❌ 連携がキャンセルされました</h2>
        <p style="color:#666;">もう一度最初からお試しください。</p>
      </div>
    `;
  } else if (code && state) {
    // Apps Scriptに認可コードを転送
    const redirectUrl = APPS_SCRIPT_URL + '?code=' + encodeURIComponent(code) + '&state=' + encodeURIComponent(state);
    window.location.href = redirectUrl;
  } else {
    document.body.innerHTML = `
      <div style="font-family:sans-serif;text-align:center;padding:40px;">
        <h2>❌ パラメータが不足しています</h2>
        <p style="color:#666;">認証リンクから再度アクセスしてください。</p>
      </div>
    `;
  }
</script>
</body>
</html>
